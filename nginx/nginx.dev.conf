# Nginx — Reverse Proxy para Desarrollo
# Unifica frontend (:3000) y backend (:8100) bajo localhost:80
# Elimina problemas de CORS en desarrollo

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8100;
}

server {
    listen 80;
    server_name localhost;

    # Tamaño máximo de cuerpo de request (para subida de archivos)
    client_max_body_size 20M;

    # ── API de Django ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;

        # Quitar prefijo /api si Django no lo espera
        # (comentar si Django ya incluye /api/ en sus URLs)
        # rewrite ^/api/(.*) /$1 break;
    }

    # ── Django Admin ────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django Static/Media ─────────────────────────────────
    location /static/ {
        proxy_pass http://backend;
    }

    location /media/ {
        proxy_pass http://backend;
    }

    # ── Next.js HMR WebSocket (Hot Module Replacement) ──────
    # SIN esto, el HMR no funciona a través de nginx
    location /_next/webpack-hmr {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }

    # ── Next.js Assets Estáticos ────────────────────────────
    location /_next/ {
        proxy_pass       http://frontend;
        proxy_set_header Host $host;
        # Cache agresivo para assets estáticos en dev
        proxy_cache_bypass $http_upgrade;
    }

    # ── Frontend Next.js (catch-all) ────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
