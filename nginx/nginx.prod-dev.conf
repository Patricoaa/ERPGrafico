# Nginx — Reverse Proxy para Prod-Dev
# Igual que nginx.dev.conf pero sin el bloque HMR WebSocket,
# ya que en modo standalone (node server.js) no hay Hot Module Replacement.

upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8100;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # ── API de Django ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Django Admin ────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django Static/Media ─────────────────────────────────
    location /static/ {
        proxy_pass http://backend;
    }

    location /media/ {
        proxy_pass http://backend;
    }

    # ── Next.js Assets Estáticos ────────────────────────────
    # En producción standalone los assets estáticos se sirven
    # directamente desde el servidor Node. Nginx los proxea con
    # cabeceras de caché agresivas.
    location /_next/static/ {
        proxy_pass       http://frontend;
        proxy_set_header Host $host;
        expires          1y;
        add_header       Cache-Control "public, immutable";
    }

    # ── Frontend Next.js (catch-all) ────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
