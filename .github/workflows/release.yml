name: Automated Versioning

on:
  push:
    branches:
      - master
      - main
    # Avoid infinite loop when the action pushes back to the repo
    paths-ignore:
      - 'frontend/package.json'
      - 'backend/VERSION'
      - 'docs/90-governance/versioning-policy.md'

jobs:
  release:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute Release
        run: |
          # Install standard-version
          npm install -g standard-version
          
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Run standard-version
          # This will bump versions, update CHANGELOG.md, and create the commit/tag
          standard-version
          
          # Push changes and tags
          git push origin HEAD:${{ github.ref_name }} --follow-tags
