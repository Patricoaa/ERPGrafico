name: CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint || echo "Lint violations found (boundaries/FSD errors to fix incrementally)"

      - name: Type Check
        run: npm run type-check

      - name: Test
        run: npm run test -- --run --coverage
      
      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: erpgrafico_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./backend
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/erpgrafico_test
      SECRET_KEY: ci-secret-key-placeholder-for-tests
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      REDIS_URL: "redis://localhost:6379"
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: './backend/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-django pytest-cov factory-boy
      
      - name: Ruff Check
        run: ruff check . || echo "Ruff found issues (non-blocking for now)"
      
      - name: Django Check
        run: python manage.py check
      
      - name: Check Migrations
        run: python manage.py makemigrations --check --dry-run
      
      - name: Run Tests
        run: |
          # Ensure we have a test settings file or use env vars
          # Pytest will use pytest.ini if it exists
          pytest --cov=. --cov-report=xml || echo "Tests failed or no tests found (non-blocking for now)"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install Security Tools
        run: pip install bandit safety
      
      - name: Bandit Scan
        run: bandit -r ./backend -ll || echo "Bandit found potential security issues"
      
      - name: Safety Check
        run: safety check || echo "Safety found vulnerable dependencies"
