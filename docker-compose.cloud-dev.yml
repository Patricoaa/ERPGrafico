# Docker Compose — Cloud Dev Stack (Mínimo Local con Frontend)
# -------------------------------------------------------
# Uso: docker compose -f docker-compose.cloud-dev.yml up -d
# -------------------------------------------------------

services:

  # ── Frontend Next.js (Modo Dev) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: erp-frontend-dev
    restart: unless-stopped
    tty: true
    stdin_open: true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.devcloud
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=https://erpgrafico-production.up.railway.app/api
      - WATCHPACK_POLLING=true
      # Limitamos la memoria que Node puede pedir antes de limpiar
      - NODE_OPTIONS=--max-old-space-size=2560
    command: sh -c "npx next dev"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          # Subimos a 3GB para dar margen al sistema operativo del contenedor
          memory: 3G

  # ── Mailpit (SMTP Trap) ─────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: erp-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

volumes:
  next_cache:
