# Docker Compose — Cloud Dev Stack (Mínimo Local con Frontend)
# -------------------------------------------------------
# Uso: docker compose -f docker-compose.cloud-dev.yml up -d
#
# Levanta los servicios locales necesarios cuando el backend está en Railway:
#   - frontend → Next.js en modo desarrollo (puerto 3000)
#   - mailpit  → trampa SMTP para emails de dev (puertos 1025, 8025)
# -------------------------------------------------------

services:

  # ── Frontend Next.js (Modo Dev) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      target: development
    container_name: erp-frontend-dev
    restart: unless-stopped
    tty: true
    stdin_open: true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.devcloud
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=https://erpgrafico-production.up.railway.app/api
      - WATCHPACK_POLLING=true
      - RUST_BACKTRACE=1
    # Borramos el CONTENIDO de .next para evitar el error de "Resource busy"
    command: sh -c "find .next -mindepth 1 -delete 2>/dev/null || true && npx next dev"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G

  # ── Mailpit (SMTP Trap) ─────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: erp-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

volumes:
  next_cache:
