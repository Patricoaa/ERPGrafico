# Docker Compose — Dev-First Setup
# -------------------------------------------------------
# Objetivo: reinicio rápido sin pérdida de caché ni sesión
#
# Volúmenes clave:
#   next_cache   → .next/ de Next.js sobrevive al reinicio
#   postgres_data → datos de la DB persisten
#
# Para limpiar TODO (caché incluido):
#   docker compose down -v
#
# MODO ESTABLE (Sin Hot Reload / Más estable en Windows):
#   docker compose -f docker-compose.yml -f docker-compose.stable.yml up frontend -d
#
# MODO HÍBRIDO (Máximo Rendimiento Front nativo + Back Docker - RECOMENDADO):
#   docker compose -f docker-compose.yml -f docker-compose.hybrid.yml up -d
#   cd frontend && npm run dev
# -------------------------------------------------------

services:

  # ── Base de Datos ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erpgrafico}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Backend Django ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file: .env.dev
    environment:
      DB_HOST: db
      DJANGO_DEBUG: "True"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      # Bind-mount del código fuente → auto-reload de Django al editar
      - ./backend:/app
      # Excluir venv del bind mount para evitar conflictos con el SO
      - backend_venv:/app/venv
    ports:
      - "8100:8100"
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis (Broker + Result Backend) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Celery Worker ───────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file: .env.dev
    environment:
      DB_HOST: db
      DJANGO_DEBUG: "True"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
      - backend_venv:/app/venv
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Sobreescribe el entrypoint para NO correr migraciones en cada worker
    entrypoint: []
    command: [ "celery", "-A", "config", "worker", "-l", "INFO", "--concurrency=2" ]
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Celery Beat (Scheduler) ─────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file: .env.dev
    environment:
      DB_HOST: db
      DJANGO_DEBUG: "True"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
      - backend_venv:/app/venv
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: []
    command: [ "celery", "-A", "config", "beat", "-l", "INFO", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler" ]
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Frontend Next.js (Dev Mode) ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file: .env.dev
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      # La API se llama a través de nginx en el navegador (URL pública)
      NEXT_PUBLIC_API_URL: http://localhost/api
      # Dentro de la red Docker, el backend se llama directamente
      BACKEND_INTERNAL_URL: http://backend:8100
      # Chokidar fix para file watching en Windows/WSL
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # Código fuente bind-montado → HMR real sin rebuild
      - ./frontend:/app
      # node_modules se mantiene dentro del contenedor (evita conflictos OS)
      - frontend_node_modules:/app/node_modules
      # .next/ en named volume → la caché de TurboPack/SWC persiste entre reinicios
      # Esto es lo que hace que el contenedor arranque en ~5s en lugar de ~60s
      - next_cache:/app/.next
    ports:
      - "3000:3000"
    networks:
      - frontend_net
    command: npm run dev
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Nginx Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - frontend_net
      - backend_net
    depends_on:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 64M

# ── Redes ───────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

# ── Volúmenes ───────────────────────────────────────────
volumes:
  # Datos de Postgres — persisten entre reinicios
  postgres_data:

  # Datos de Redis — persisten entre reinicios (opcional, se puede quitar)
  redis_data:

  # Caché de Next.js (.next/) — CLAVE para arranque rápido
  # No se elimina con `docker compose down`, solo con `docker compose down -v`
  next_cache:

  # node_modules del frontend — isolado del SO host (evita bugs en Windows)
  frontend_node_modules:

  # venv del backend — isolado del SO host
  backend_venv:
