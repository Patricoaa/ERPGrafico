# Docker Compose — Stable Dev Setup (No HMR)
# -------------------------------------------------------
# Uso: docker compose -f docker-compose.yml -f docker-compose.stable.yml up
#
# Este archivo sobreescribe el comportamiento del frontend para evitar
# el Hot Module Replacement (HMR) y la inestabilidad de la compilación
# en tiempo real, ejecutando un build de producción y luego sirviéndolo.
# -------------------------------------------------------

services:
  frontend:
    # Cambiamos el comando para que haga build y start
    # Usamos npx para asegurar que encuentre los binarios en node_modules
    command: >
      sh -c "if [ ! -d 'node_modules' ]; then npm install; fi && npx next build && npx next start"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    # Mantenemos los volúmenes para que el build se guarde en next_cache
    # Pero ignoramos los cambios en caliente del bind-mount para la ejecución
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - next_cache:/app/.next
    deploy:
      resources:
        limits:
          memory: 4G
