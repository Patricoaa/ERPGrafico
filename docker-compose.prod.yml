services:
  db:
    image: postgres:17-alpine
    restart: always
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=erpgrafico
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432" # Use a different port to avoid conflict with dev

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6380:6379" # Use a different port to avoid conflict with dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py collectstatic --no-input &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8100 --workers 4"
    ports:
      - "8101:8100"
    depends_on:
      - db
      - redis
    environment:
      - DEBUG=0
      - SECRET_KEY=prod_secret_key_for_test
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - DATABASE_URL=postgres://postgres:postgres@db:5432/erpgrafico
      - CELERY_BROKER_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: >
      sh -c "npm run build && npm run start"
    ports:
      - "4001:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8101/api
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 2048M # Production build uses less RAM at runtime than dev

volumes:
  postgres_data_prod:
