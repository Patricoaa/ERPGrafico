# Docker Compose — Production Local (Standalone)
# -------------------------------------------------------
# Uso: docker compose -f docker-compose.prod.yml -p erpgrafico-prod up -d
#
# Construir (primera vez o tras cambios de código):
#   docker compose -f docker-compose.prod.yml -p erpgrafico-prod build
#
# Las migraciones corren automáticamente al arrancar via entrypoint.sh.
# Para migraciones manuales:
#   SKIP_MIGRATIONS=true docker compose -f docker-compose.prod.yml -p erpgrafico-prod up -d
#   docker compose -f docker-compose.prod.yml -p erpgrafico-prod exec backend python manage.py migrate
#
# Ejecución paralela con dev (puertos distintos por proyecto):
#   Dev:  docker compose up -d                        # puertos 5433, 6379, 8100, 3000, 80
#   Prod: docker compose -f docker-compose.prod.yml -p erpgrafico-prod up -d  # puertos 5434, 6380, 8101, 3001, 8080
# -------------------------------------------------------

services:

  # ── Base de Datos ───────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erpgrafico}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 120mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  # ── Backend Django ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      network: host
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DB_HOST: db
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    ports:
      - "8101:8100"
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── Celery Worker ───────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      network: host
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DB_HOST: db
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: []
    command: [ "celery", "-A", "config", "worker", "-l", "INFO", "--concurrency=2" ]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Celery Beat ─────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
      network: host
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DB_HOST: db
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    networks:
      - backend_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: []
    command: [ "celery", "-A", "config", "beat", "-l", "INFO", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler" ]
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M

  # ── Frontend Next.js (Standalone) ───────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      network: host
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3001:3000"
    networks:
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ── Nginx ───────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.prod-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/media:/app/media:ro
    ports:
      - "8080:80"
    networks:
      - frontend_net
      - backend_net
    depends_on:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 64M

# ── Redes ───────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

# ── Volúmenes ───────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
