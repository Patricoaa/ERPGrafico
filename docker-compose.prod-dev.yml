# Docker Compose — Override Prod-Dev
# -------------------------------------------------------
# Propósito: levantar el frontend compilado en modo producción
# (next build + node server.js standalone) mientras el resto del
# stack (backend, celery, redis, postgres) permanece en modo dev.
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.prod-dev.yml up --build
#
# Para forzar rebuild del frontend (ej: después de cambios en código):
#   docker compose -f docker-compose.yml -f docker-compose.prod-dev.yml up --build frontend
#
# NOTA: No usar 'npm run dev' ni volúmenes de bind-mount en el frontend.
# El binario compilado vive en /app-standalone dentro de la imagen.
# -------------------------------------------------------

services:

  # ── Frontend Next.js (Producción Standalone) ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Usar el stage 'runner' del multi-stage build
      # (deps → builder → runner)
      target: runner
      args:
        # NEXT_PUBLIC_* se hornea en el bundle durante el build.
        # Debe coincidir con la URL pública que usará el navegador.
        # Nginx expone /api en localhost:80.
        NEXT_PUBLIC_API_URL: http://localhost/api
    command: [ "node", "server.js" ]
    # Sin bind-mounts: el código compilado está dentro de la imagen
    # en /app-standalone. Los volúmenes del compose base (./frontend:/app,
    # next_cache, node_modules) no aplican en este stage.
    volumes: []
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # URL interna para Server Components que llaman al backend
      # directamente dentro de la red Docker (sin pasar por nginx)
      BACKEND_INTERNAL_URL: http://backend:8100
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    # El servicio no necesita WATCHPACK_POLLING ni CHOKIDAR (solo dev)
    # No hay memory_limit extra: el runtime de producción usa muy poca RAM

    # ── Nginx (usa config para prod-dev, sin bloque HMR) ────
  nginx:
    volumes:
      - ./nginx/nginx.prod-dev.conf:/etc/nginx/conf.d/default.conf:ro
